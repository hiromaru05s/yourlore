<!doctype html><meta charset="utf-8">
<style>
  body{background:#0b1018;margin:0;padding:26px;display:flex;gap:22px;flex-wrap:wrap}
  .card{--cw:300px;--ch:calc(300px/0.64);position:relative;width:var(--cw);height:var(--ch);border-radius:6px;
    background-size:100% 100%;background-repeat:no-repeat;font-size:calc(var(--cw)*0.135);color:#e8dcc0;box-shadow:0 8px 22px #000a}
  .card-cost{position:absolute;top:3.5%;left:4%;width:1.55em;height:1.55em;display:grid;place-items:center;
    font-family:monospace;font-weight:700;font-size:1.05em;color:#fff;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff5,transparent 60%),#b8442a;border:1.5px solid #fff8;box-shadow:0 1px 3px #000a;z-index:3}
  .card--spell .card-cost{background:radial-gradient(circle at 35% 30%,#fff5,transparent 60%),#2f6ea8}
  .card--trap .card-cost{background:radial-gradient(circle at 35% 30%,#fff5,transparent 60%),#3f8a4a}
  .card-name{position:absolute;top:3%;left:25%;right:23%;height:8.8%;display:flex;align-items:center;justify-content:flex-start;
    font-weight:800;font-size:0.6em;line-height:1;letter-spacing:-.02em;color:#100c06;text-shadow:0 1px 1px rgba(255,255,255,.35);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-art{position:absolute;top:16.5%;left:7.5%;right:7.5%;height:47%;border-radius:3px;overflow:hidden;background:#12203a}
  .card-art img{width:100%;height:100%;display:block;object-fit:cover}
  .card-eff{position:absolute;left:9%;right:9%;top:68%;height:17.3%;font-size:0.45em;line-height:1.12;color:#2a2114;
    text-align:center;overflow:hidden;word-break:keep-all;display:flex;align-items:center;justify-content:center}
  .card--spell .card-eff,.card--trap .card-eff{height:28.3%}
  .card-ad{position:absolute;left:0;right:0;top:87.5%;height:8.8%;font-family:monospace;font-weight:800;font-size:1em;line-height:1}
  .ad-atk,.ad-def{position:absolute;top:50%;transform:translateY(-50%);width:22%;text-align:center;color:#100c06;text-shadow:0 1px 1px rgba(255,255,255,.35);white-space:nowrap}
  .ad-atk{left:22%}.ad-def{left:71%}
</style>
<div class="card card--mon" style="background-image:url(https://lore-server.maruru836818.workers.dev/frames/red.png)">
  <div class="card-cost">2</div><div class="card-name">블레이드 헤어</div>
  <div class="card-art"><img src="https://lore-server.maruru836818.workers.dev/art/cards/M4.webp"></div>
  <div class="card-ad"><span class="ad-atk">5</span><span class="ad-def">2</span></div><div class="card-eff">—</div>
</div>
<div class="card card--mon" style="background-image:url(https://lore-server.maruru836818.workers.dev/frames/red.png)">
  <div class="card-cost">10</div><div class="card-name">파멸의 광전사 II</div>
  <div class="card-art"><img src="https://lore-server.maruru836818.workers.dev/art/cards/GM10_0.webp"></div>
  <div class="card-ad"><span class="ad-atk">24</span><span class="ad-def">8</span></div><div class="card-eff">—</div>
</div>
<div class="card card--spell" style="background-image:url(https://lore-server.maruru836818.workers.dev/frames/blue.png)">
  <div class="card-cost">2</div><div class="card-name">살생의 극의</div>
  <div class="card-art"><img src="https://lore-server.maruru836818.workers.dev/art/cards/SLAY_ART.webp"></div>
  <div class="card-eff">영구: 양 플레이어 중 누구든 데미지를 받을 때마다 추가 데미지 +2</div>
</div>
<div class="card card--trap" style="background-image:url(https://lore-server.maruru836818.workers.dev/frames/green.png)">
  <div class="card-cost">1</div><div class="card-name">가시 덫</div>
  <div class="card-art"><img src="https://lore-server.maruru836818.workers.dev/art/cards/T8.webp"></div>
  <div class="card-eff">공격을 받으면 공격측에 4 데미지</div>
</div>
